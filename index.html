<style>
  html { scroll-behavior: smooth; }
  body {
    background: oklch(0.992 0.003 90);
    color: oklch(0.14 0.04 255);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .font-display { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* striped placeholder */
  .stripes {
    background-image: repeating-linear-gradient(
      135deg,
      oklch(0.93 0.008 255) 0 10px,
      oklch(0.96 0.005 255) 10px 20px
    );
  }
  .stripes-brand {
    background-image: repeating-linear-gradient(
      135deg,
      oklch(0.30 0.14 255) 0 10px,
      oklch(0.26 0.12 255) 10px 20px
    );
  }

  /* grid paper */
  .grid-paper {
    background-image:
      linear-gradient(to right, oklch(0.92 0.008 255 / 0.6) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(0.92 0.008 255 / 0.6) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* scroll-bar (subtle) */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.85 0.01 255); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(0.7 0.02 255); }

  /* car shadow */
  .car-shadow {
    filter: drop-shadow(0 30px 20px oklch(0.32 0.14 255 / 0.22));
  }

  /* marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: marquee 40s linear infinite; }

  /* card tilt base */
  .tilt-card { transform-style: preserve-3d; transition: transform 400ms cubic-bezier(.2,.8,.2,1); }

  /* selection */
  ::selection { background: oklch(0.74 0.10 255 / 0.4); }

  /* noscroll when modal */
  .no-scroll { overflow: hidden; }

  /* underline animated */
  .link-underline { position: relative; }
  .link-underline::after {
    content: ''; position: absolute; left: 0; bottom: -4px; height: 2px; width: 0;
    background: currentColor; transition: width 280ms ease;
  }
  .link-underline:hover::after { width: 100%; }

  /* reveal safety fallback */
  .reveal-hidden { opacity: 0; transform: translateY(24px); }

  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>

  <!-- React + Babel pinned -->
  <script>
    // Suppress known harmless warning from framer-motion internal child tracking

        const s = String(args[0] || '');
        if (s.includes('unique "key" prop')) return;
        return origErr.apply(this, args);
      };
    })();
  </script>
